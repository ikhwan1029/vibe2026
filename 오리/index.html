<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공조냉동기계기사 퀴즈</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      color: white;
    }

    header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 15px;
      opacity: 0.8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      max-width: 900px;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 30px 24px;
      text-decoration: none;
      color: #1e3a5f;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 50px rgba(0,0,0,0.4);
    }

    .card .icon {
      font-size: 40px;
    }

    .card h2 {
      font-size: 18px;
      color: #1e3a5f;
    }

    .card p {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .card .count {
      margin-top: 6px;
      background: #dbeafe;
      color: #1e40af;
      font-size: 12px;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 999px;
    }

    .card-all {
      background: linear-gradient(135deg, #1e40af, #0891b2);
      color: white;
      grid-column: 1 / -1;
    }

    .card-all h2,
    .card-all p {
      color: white;
    }

    .card-all .count {
      background: rgba(255,255,255,0.2);
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>❄️ 공조냉동기계기사 퀴즈</h1>
    <p>공부할 분야를 선택하세요</p>
  </header>

  <div class="grid">
    <a href="quiz/?cat=에너지관리" class="card">
      <div class="icon">⚡</div>
      <h2>에너지관리</h2>
      <p>냉동사이클, 성적계수(COP),<br>열역학 기초 이론</p>
      <span class="count">20문제</span>
    </a>

    <a href="quiz/?cat=공조냉동설계" class="card">
      <div class="icon">📐</div>
      <h2>공조냉동설계</h2>
      <p>냉매 종류·특성,<br>공기조화 설계</p>
      <span class="count">20문제</span>
    </a>

    <a href="quiz/?cat=시운전 및 안전관리" class="card">
      <div class="icon">🛡️</div>
      <h2>시운전 및 안전관리</h2>
      <p>배관·안전 기준,<br>전기·제어 장치</p>
      <span class="count">20문제</span>
    </a>

    <a href="quiz/?cat=유지보수 공사관리" class="card">
      <div class="icon">🔧</div>
      <h2>유지보수 공사관리</h2>
      <p>냉동장치 및 부속기기<br>점검·유지보수</p>
      <span class="count">20문제</span>
    </a>

    <a href="quiz/" class="card card-all">
      <div class="icon">📝</div>
      <h2>전체 문제 랜덤</h2>
      <p>모든 분야에서 랜덤으로 10문제 출제</p>
      <span class="count">100문제 중 랜덤</span>
    </a>
  </div>
</body>
</html>

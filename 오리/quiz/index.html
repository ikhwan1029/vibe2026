<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공조냉동기계기사 퀴즈</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      --card: #ffffff;
      --text: #1e3a5f;
      --subtext: #666;
      --progress-bg: #e0e0e0;
      --qbox-bg: #f0f7ff;
      --qbox-border: #2563eb;
      --option-bg: #ffffff;
      --option-border: #ddd;
      --option-hover-bg: #eff6ff;
      --option-hover-border: #2563eb;
      --explain-bg: #fffbeb;
      --explain-border: #fcd34d;
      --explain-text: #92400e;
      --badge-bg: #dbeafe;
      --badge-text: #1e40af;
    }

    [data-theme="dark"] {
      --bg: linear-gradient(135deg, #0a0a0a, #111827, #1e293b);
      --card: #1e293b;
      --text: #e2e8f0;
      --subtext: #94a3b8;
      --progress-bg: #334155;
      --qbox-bg: #0f172a;
      --qbox-border: #3b82f6;
      --option-bg: #0f172a;
      --option-border: #334155;
      --option-hover-bg: #1e3a5f;
      --option-hover-border: #3b82f6;
      --explain-bg: #1c1a07;
      --explain-border: #854d0e;
      --explain-text: #fcd34d;
      --badge-bg: #1e3a5f;
      --badge-text: #93c5fd;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: var(--card);
      border-radius: 20px;
      padding: 40px;
      max-width: 720px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transition: background 0.3s;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    h1 { color: var(--text); font-size: 22px; flex: 1; text-align: center; }

    .dark-toggle {
      background: none;
      border: 2px solid var(--option-border);
      border-radius: 999px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 17px;
      color: var(--text);
    }

    .subtitle { text-align: center; color: var(--subtext); font-size: 13px; margin-bottom: 20px; }

    .badge {
      display: inline-block;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 12px;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    .progress-bar { background: var(--progress-bg); border-radius: 999px; height: 8px; margin-bottom: 6px; }
    .progress-fill {
      background: linear-gradient(90deg, #2563eb, #06b6d4);
      height: 8px; border-radius: 999px; transition: width 0.4s ease;
    }
    .progress-text { text-align: right; font-size: 12px; color: var(--subtext); margin-bottom: 18px; }

    .question-box {
      background: var(--qbox-bg);
      border-left: 5px solid var(--qbox-border);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .question-num { font-size: 11px; color: var(--qbox-border); font-weight: bold; margin-bottom: 6px; }
    .question-text { font-size: 16px; color: var(--text); line-height: 1.6; }

    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }

    .option {
      padding: 12px 16px;
      border: 2px solid var(--option-border);
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      background: var(--option-bg);
      color: var(--text);
      text-align: left;
    }
    .option:hover:not(:disabled) { border-color: var(--option-hover-border); background: var(--option-hover-bg); }
    .option.correct { border-color: #16a34a; background: #f0fdf4; color: #15803d; font-weight: bold; }
    .option.wrong { border-color: #dc2626; background: #fef2f2; color: #dc2626; }
    [data-theme="dark"] .option.correct { background: #052e16; color: #4ade80; }
    [data-theme="dark"] .option.wrong { background: #1c0a0a; color: #f87171; }
    .option:disabled { cursor: default; }

    .explanation {
      background: var(--explain-bg);
      border: 1px solid var(--explain-border);
      border-radius: 10px;
      padding: 14px;
      font-size: 13px;
      color: var(--explain-text);
      line-height: 1.6;
      margin-bottom: 16px;
      display: none;
    }

    .btn-row { display: flex; gap: 10px; }

    .btn {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-prev { background: #e5e7eb; color: #374151; }
    [data-theme="dark"] .btn-prev { background: #334155; color: #e2e8f0; }
    .btn-prev:disabled { opacity: 0.3; cursor: default; }
    .btn-next { background: linear-gradient(90deg, #2563eb, #06b6d4); color: white; }
    .btn-next:disabled { opacity: 0.4; cursor: default; }
    .btn:hover:not(:disabled) { opacity: 0.85; }

    .result { text-align: center; display: none; }
    .result h2 { font-size: 26px; color: var(--text); margin-bottom: 10px; }
    .score { font-size: 60px; font-weight: bold; color: #2563eb; margin: 16px 0; }
    [data-theme="dark"] .score { color: #60a5fa; }
    .score-msg { font-size: 17px; color: var(--subtext); margin-bottom: 24px; }
    .review-list { text-align: left; margin-bottom: 24px; }
    .review-item {
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 13px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .review-item.ok { background: #f0fdf4; color: #15803d; }
    .review-item.ng { background: #fef2f2; color: #dc2626; }
    [data-theme="dark"] .review-item.ok { background: #052e16; color: #4ade80; }
    [data-theme="dark"] .review-item.ng { background: #1c0a0a; color: #f87171; }
    .review-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .restart-btn {
      padding: 13px 36px;
      background: linear-gradient(90deg, #2563eb, #06b6d4);
      color: white; border: none; border-radius: 12px;
      font-size: 15px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div style="width:60px"></div>
    <h1>❄️ 공조냉동기계기사 퀴즈</h1>
    <button class="dark-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
  <p class="subtitle">100문제 풀 · 매회 랜덤 10문제 · 분야별 출제</p>

  <div id="quizArea">
    <div class="badge" id="categoryBadge"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>

    <div class="question-box">
      <div class="question-num" id="questionNum"></div>
      <div class="question-text" id="questionText"></div>
    </div>

    <div class="options" id="options"></div>
    <div class="explanation" id="explanation"></div>

    <div class="btn-row">
      <button class="btn btn-prev" id="prevBtn" onclick="prevQuestion()">◀ 이전</button>
      <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()" disabled>다음 문제</button>
    </div>
  </div>

  <div class="result" id="result">
    <h2>퀴즈 완료!</h2>
    <div class="score" id="scoreText"></div>
    <div class="score-msg" id="scoreMsg"></div>
    <div class="review-list" id="reviewList"></div>
    <button class="restart-btn" onclick="restart()">다시 풀기</button>
  </div>
</div>

<script>
const allQuestions = [
  // ── 냉동공학 기초 (20문제) ──────────────────────────────────
  { cat:"냉동공학 기초", q:"냉동사이클에서 압축기의 역할로 옳은 것은?", options:["냉매를 응축시킨다","냉매 증기를 고온·고압으로 압축한다","냉매를 팽창시킨다","냉매를 증발시킨다"], answer:1, explanation:"압축기는 증발기에서 나온 저온·저압의 냉매 증기를 고온·고압으로 압축하여 응축기로 보냅니다." },
  { cat:"냉동공학 기초", q:"표준 냉동사이클의 순서로 옳은 것은?", options:["압축→증발→팽창→응축","증발→압축→응축→팽창","응축→팽창→증발→압축","팽창→응축→압축→증발"], answer:1, explanation:"냉동사이클: 증발(저압 흡열) → 압축(고압) → 응축(고압 방열) → 팽창밸브(저압) 순서입니다." },
  { cat:"냉동공학 기초", q:"1RT(냉동톤)의 정의로 옳은 것은?", options:["0°C 물 1ton을 24시간에 0°C 얼음으로 만드는 능력","0°C 물 1kg을 1시간 냉각하는 능력","100°C 증기 1ton을 응축시키는 능력","물 1ton을 1°C 냉각하는 열량"], answer:0, explanation:"1RT ≈ 3,320kcal/h이며 0°C 물 1톤을 24시간 동안 얼음으로 만드는 냉동능력입니다." },
  { cat:"냉동공학 기초", q:"성적계수(COP)의 정의로 옳은 것은?", options:["압축일/냉동효과","냉동효과/압축일","응축열량/냉동효과","냉동효과/응축열량"], answer:1, explanation:"COP = 냉동효과(Q₂)/압축일(W). COP가 클수록 효율이 높습니다." },
  { cat:"냉동공학 기초", q:"히트펌프 COP와 냉동기 COP의 관계로 옳은 것은?", options:["COP_HP = COP_냉동 - 1","COP_HP = COP_냉동 + 1","COP_HP = COP_냉동 × 2","COP_HP = 1/COP_냉동"], answer:1, explanation:"COP_HP = COP_냉동 + 1. 히트펌프는 냉동효과와 압축일 모두를 난방에 활용합니다." },
  { cat:"냉동공학 기초", q:"몰리에르 선도(P-h 선도)의 가로축과 세로축은?", options:["온도/압력","엔탈피/압력","엔트로피/온도","압력/엔탈피"], answer:1, explanation:"P-h 선도: 가로축 = 엔탈피(h), 세로축 = 압력(P). 냉동사이클 해석에 사용됩니다." },
  { cat:"냉동공학 기초", q:"카르노 냉동사이클의 성적계수 식으로 옳은 것은?", options:["TL/(TH-TL)","TH/(TH-TL)","(TH-TL)/TL","TL/TH"], answer:0, explanation:"카르노 COP = TL/(TH-TL). TL은 저온(증발)온도, TH는 고온(응축)온도(절대온도)입니다." },
  { cat:"냉동공학 기초", q:"2단 압축 냉동사이클을 적용하는 주요 이유는?", options:["냉매 충전량 감소","압축비가 높을 때 효율 향상과 토출온도 저하","응축온도 상승","팽창밸브 수명 연장"], answer:1, explanation:"압축비가 8 이상으로 클 때 2단 압축으로 효율을 높이고 토출가스 온도를 낮춥니다." },
  { cat:"냉동공학 기초", q:"냉동효과(Refrigerating Effect)란?", options:["압축기가 냉매에 한 일","응축기에서 방출된 열량","증발기에서 냉매 1kg이 흡수하는 열량","팽창밸브에서 감소하는 엔탈피"], answer:2, explanation:"냉동효과 = 증발기 출구 엔탈피 - 팽창밸브 입구 엔탈피 (kcal/kg)." },
  { cat:"냉동공학 기초", q:"과냉각(Sub-cooling)의 효과로 옳은 것은?", options:["압축일 감소","냉동효과 증가","증발압력 상승","압축기 흡입온도 상승"], answer:1, explanation:"과냉각은 팽창밸브 전 액냉매를 더 냉각시켜 플래시가스 발생을 줄이고 냉동효과를 높입니다." },
  { cat:"냉동공학 기초", q:"과열(Super-heating)이 냉동사이클에 미치는 영향으로 옳은 것은?", options:["냉동효과 감소, 압축일 감소","냉동효과 증가, 압축일 증가","냉동효과 감소, 압축일 증가","냉동효과 증가, 압축일 감소"], answer:1, explanation:"흡입가스 과열은 냉동효과와 압축일을 모두 증가시키나 COP에는 큰 변화가 없습니다." },
  { cat:"냉동공학 기초", q:"냉동장치에서 플래시가스(Flash Gas) 발생 원인은?", options:["증발기 냉각 부족","팽창 과정에서 액냉매 일부가 증발","압축기 과열","응축기 용량 부족"], answer:1, explanation:"플래시가스는 팽창밸브 전 액냉매가 교축 과정에서 일부 증발하여 생기는 증기입니다." },
  { cat:"냉동공학 기초", q:"냉동장치의 응축온도가 높아질 때 나타나는 현상은?", options:["COP 증가","압축비 감소","소비동력 증가","냉동능력 증가"], answer:2, explanation:"응축온도 상승 → 압축비 증가 → 소비동력 증가, COP 감소." },
  { cat:"냉동공학 기초", q:"증발온도가 낮아질 때 냉동장치에 나타나는 현상은?", options:["냉동능력 증가","압축기 체적효율 증가","COP 감소","소비동력 감소"], answer:2, explanation:"증발온도 저하 → 압축비 증가 → 체적효율 감소, 냉동능력 감소, COP 감소." },
  { cat:"냉동공학 기초", q:"냉동장치에서 액백(Liquid Back) 현상의 원인은?", options:["압축기 과열","팽창밸브 과소 개방","증발기 냉각 부족으로 액냉매가 압축기로 흡입","응축압력 저하"], answer:2, explanation:"액백은 증발기에서 미증발 액냉매가 압축기로 흡입되는 현상으로 압축기 손상을 유발합니다." },
  { cat:"냉동공학 기초", q:"냉동장치에서 불응축가스 혼입 시 나타나는 현상은?", options:["흡입압력 상승","응축압력 비정상 상승","냉동능력 증가","압축기 흡입온도 저하"], answer:1, explanation:"불응축가스(공기, 질소 등) 혼입 시 응축기 내 분압 증가로 응축압력이 비정상적으로 상승합니다." },
  { cat:"냉동공학 기초", q:"이원냉동사이클(Cascade System)을 사용하는 목적은?", options:["중간 온도 범위 냉동","-70°C 이하 초저온 냉동","상온 냉동 효율 향상","대용량 냉동"], answer:1, explanation:"이원냉동은 두 냉동사이클을 직렬로 연결하여 -70°C 이하의 초저온을 얻을 때 사용합니다." },
  { cat:"냉동공학 기초", q:"냉동장치에서 수분 혼입 시 나타나는 현상으로 틀린 것은?", options:["팽창밸브 동결(icing)","냉동유 열화","응축압력 감소","금속부식 촉진"], answer:2, explanation:"수분 혼입 시 팽창밸브 동결, 냉동유 열화, 부식이 발생합니다. 응축압력 감소는 수분과 무관합니다." },
  { cat:"냉동공학 기초", q:"냉동장치의 냉동능력을 나타내는 식으로 옳은 것은?", options:["Q = G × (h₁-h₄)","Q = G × (h₂-h₁)","Q = G × (h₂-h₃)","Q = G × (h₃-h₄)"], answer:0, explanation:"냉동능력 Q = 냉매순환량(G) × 냉동효과(h₁-h₄). h₁=증발기 출구, h₄=증발기 입구 엔탈피." },
  { cat:"냉동공학 기초", q:"압축기의 체적효율에 영향을 미치는 요소가 아닌 것은?", options:["압축비","클리어런스 체적","냉매 종류","응축기 팬 속도"], answer:3, explanation:"체적효율은 압축비, 클리어런스, 냉매 성질, 밸브 저항 등에 영향을 받습니다. 응축기 팬 속도는 직접 관계없습니다." },

  // ── 냉매 (20문제) ────────────────────────────────────────────
  { cat:"냉매", q:"프레온 냉매 R-22의 화학식으로 옳은 것은?", options:["CCl₂F₂","CHClF₂","CH₂F₂","C₂H₂F₄"], answer:1, explanation:"R-22(HCFC-22)의 화학식은 CHClF₂입니다. R-12는 CCl₂F₂, R-32는 CH₂F₂입니다." },
  { cat:"냉매", q:"암모니아(R-717) 냉매의 특성으로 틀린 것은?", options:["독성이 있다","가연성이 있다","ODP가 0이다","동 배관을 사용한다"], answer:3, explanation:"암모니아는 구리(동)와 반응하여 부식시키므로 강관을 사용해야 합니다." },
  { cat:"냉매", q:"오존파괴지수(ODP)가 0인 냉매는?", options:["R-11","R-12","R-134a","R-22"], answer:2, explanation:"R-134a(HFC)는 염소(Cl)가 없어 ODP=0입니다. R-11, R-12, R-22는 Cl을 포함하여 ODP>0." },
  { cat:"냉매", q:"냉매가 갖추어야 할 조건으로 틀린 것은?", options:["증발잠열이 클 것","임계온도가 낮을 것","독성과 가연성이 없을 것","증발압력이 대기압보다 높을 것"], answer:1, explanation:"냉매는 임계온도가 높아야 상온에서 응축이 용이합니다." },
  { cat:"냉매", q:"R-410A 냉매에 대한 설명으로 옳은 것은?", options:["단일 냉매이다","R-32와 R-125의 혼합냉매이다","ODP가 1이다","R-22보다 낮은 압력에서 운전된다"], answer:1, explanation:"R-410A는 R-32(50%)와 R-125(50%)의 혼합냉매로 R-22 대체용입니다." },
  { cat:"냉매", q:"이산화탄소(R-744)를 냉매로 사용할 때의 특징으로 옳은 것은?", options:["낮은 운전압력","GWP가 매우 높다","자연냉매로 환경 친화적이다","가연성이 높다"], answer:2, explanation:"CO₂(R-744)는 자연냉매로 ODP=0, GWP=1이며 친환경적이나 고압(초임계) 운전이 필요합니다." },
  { cat:"냉매", q:"냉매의 누설 검지 방법으로 암모니아 냉매에 사용하는 것은?", options:["할라이드 토치","전자식 검지기","유황 양초","비눗물"], answer:2, explanation:"암모니아 누설 시 유황 양초에서 흰 연기(황화암모늄)가 발생합니다. 할라이드 토치는 프레온 검지에 사용합니다." },
  { cat:"냉매", q:"프레온 냉매가 화염에 접촉하면 발생하는 유해가스는?", options:["일산화탄소","포스겐(COCl₂)","황화수소","오존"], answer:1, explanation:"프레온 냉매가 고온 화염에 접촉하면 독성 가스인 포스겐(COCl₂)이 발생합니다." },
  { cat:"냉매", q:"공비혼합냉매(Azeotropic Mixture)의 특징으로 옳은 것은?", options:["성분에 따라 증발온도가 다르다","단일냉매처럼 일정 온도에서 증발한다","누설 시 성분비가 변한다","ODP가 반드시 0이다"], answer:1, explanation:"공비혼합냉매는 특정 비율에서 단일냉매처럼 거동하며 일정 온도에서 증발합니다." },
  { cat:"냉매", q:"냉매의 GWP(지구온난화지수) 기준물질과 그 값은?", options:["CO₂ = 1","CH₄ = 1","R-11 = 1","R-12 = 1"], answer:0, explanation:"GWP는 CO₂를 기준(GWP=1)으로 동일 질량의 온난화 기여도를 나타냅니다." },
  { cat:"냉매", q:"냉동유(냉동기 오일)가 갖추어야 할 조건으로 틀린 것은?", options:["유동점이 낮을 것","냉매와 쉽게 반응할 것","절연성이 좋을 것","화학적으로 안정할 것"], answer:1, explanation:"냉동유는 냉매와 반응하지 않아야 하며, 화학적으로 안정적이고 냉매와 분리성이 좋아야 합니다." },
  { cat:"냉매", q:"프로판(R-290)을 냉매로 사용 시 가장 큰 단점은?", options:["ODP가 높다","GWP가 높다","가연성·폭발성이 있다","냉동능력이 낮다"], answer:2, explanation:"R-290(프로판)은 자연냉매로 ODP=0, GWP=3이나 가연성·폭발성이 있어 안전 관리가 필요합니다." },
  { cat:"냉매", q:"냉매 충전 시 액체 상태로 충전하는 기기는?", options:["압축기","증발기","수액기","유분리기"], answer:2, explanation:"수액기(Receiver)는 응축된 액냉매를 저장하여 안정적으로 팽창밸브에 공급하는 역할을 합니다." },
  { cat:"냉매", q:"R-12를 R-134a로 대체할 때 주의사항으로 틀린 것은?", options:["냉동유 교체 필요","배관 세정 필요","압축기 교체 불필요","팽창밸브 재조정 필요"], answer:2, explanation:"R-134a는 R-12와 압력특성, 윤활유 호환성이 다르므로 압축기도 교체가 필요할 수 있습니다." },
  { cat:"냉매", q:"비공비혼합냉매의 특징으로 옳은 것은?", options:["일정 온도에서 증발한다","증발·응축 시 온도 변화(Temperature Glide)가 있다","누설 시 성분비가 변하지 않는다","공비점이 없다"], answer:1, explanation:"비공비혼합냉매는 증발·응축 과정에서 온도 구배(Temperature Glide)가 발생합니다." },
  { cat:"냉매", q:"냉매 R 번호에서 R-500번대가 의미하는 것은?", options:["단일 냉매","공비혼합냉매","비공비혼합냉매","무기 냉매"], answer:1, explanation:"ASHRAE 번호 체계: 100번대=HCFC, 200번대=HFC, 500번대=공비혼합, 600번대=기타유기, 700번대=무기." },
  { cat:"냉매", q:"암모니아 냉동장치에서 냉매 누설 시 응급처치로 옳은 것은?", options:["마른 수건으로 코를 막는다","다량의 물로 씻는다","암모니아는 무해하므로 방치한다","산소 호흡기를 착용한다"], answer:1, explanation:"암모니아는 물에 잘 용해되므로 다량의 물로 씻어내는 것이 효과적입니다." },
  { cat:"냉매", q:"냉매의 표준 비등점이 낮을수록 나타나는 특성은?", options:["증발압력이 낮다","응축압력이 낮다","저온 냉동에 유리하다","COP가 높다"], answer:2, explanation:"비등점이 낮은 냉매는 저온에서도 충분한 증발압력을 유지하므로 저온·초저온 냉동에 유리합니다." },
  { cat:"냉매", q:"몬트리올 의정서(Montreal Protocol)와 관련된 냉매는?", options:["R-134a","R-32","R-12","R-744"], answer:2, explanation:"몬트리올 의정서는 오존층 파괴물질(CFC, HCFC) 규제를 위한 국제협약으로, R-12(CFC-12)가 규제 대상입니다." },
  { cat:"냉매", q:"다음 냉매 중 가장 높은 GWP를 가진 것은?", options:["R-134a(GWP 1,430)","R-32(GWP 675)","R-744(GWP 1)","R-717(GWP 0)"], answer:0, explanation:"R-134a의 GWP는 약 1,430으로 주요 냉매 중 높은 편입니다. R-717(암모니아)은 GWP=0입니다." },

  // ── 공기조화 (20문제) ─────────────────────────────────────
  { cat:"공기조화", q:"공기조화의 4대 요소에 해당하지 않는 것은?", options:["온도","습도","기류","소음"], answer:3, explanation:"공기조화 4대 요소: 온도, 습도, 기류(풍속), 청정도(먼지). 소음은 포함되지 않습니다." },
  { cat:"공기조화", q:"습공기 선도에서 노점온도(露點溫度)란?", options:["공기를 가열할 때의 온도","습공기 냉각 시 수분이 응결되기 시작하는 온도","건구온도와 습구온도의 평균","상대습도 50%일 때 온도"], answer:1, explanation:"노점온도는 상대습도가 100%가 되는 온도, 즉 이슬이 맺히기 시작하는 온도입니다." },
  { cat:"공기조화", q:"상대습도(Relative Humidity)의 정의로 옳은 것은?", options:["단위 체적당 수증기 질량","현재 수증기압/포화수증기압 × 100%","건구온도와 습구온도의 차이","공기 중 수증기의 몰분율"], answer:1, explanation:"상대습도 = (현재 수증기압/포화수증기압) × 100%로 공기의 포화 정도를 나타냅니다." },
  { cat:"공기조화", q:"습구온도(Wet Bulb Temperature)에 대한 설명으로 옳은 것은?", options:["공기의 실제 온도","젖은 헝겊으로 감싼 온도계로 측정한 온도","노점온도와 항상 같다","건구온도보다 항상 높다"], answer:1, explanation:"습구온도는 물이 증발할 때 냉각 효과를 이용한 온도로, 습도가 낮을수록 건구온도와 차이가 큽니다." },
  { cat:"공기조화", q:"팬코일 유닛(FCU) 방식의 특징으로 옳은 것은?", options:["중앙에서 공기를 처리해 각 실에 공급","각 실 유닛에서 냉온수로 공기 처리","냉매를 직접 각 실까지 배관","환기가 전혀 안 된다"], answer:1, explanation:"FCU 방식은 각 실 유닛에 중앙에서 냉온수를 공급하여 개별 온도 제어가 가능합니다." },
  { cat:"공기조화", q:"현열비(SHF, Sensible Heat Factor)의 정의는?", options:["전열량/현열량","현열량/전열량","잠열량/현열량","현열량/잠열량"], answer:1, explanation:"SHF = 현열량(sensible heat)/전열량(total heat). SHF가 클수록 온도 변화 비중이 높습니다." },
  { cat:"공기조화", q:"VAV(Variable Air Volume) 방식의 특징으로 옳은 것은?", options:["공급 공기량 일정, 온도 변화","공급 공기량 변화로 부하 대응","전기 소비량이 CAV보다 항상 많다","소음이 크다"], answer:1, explanation:"VAV는 공급 풍량을 변화시켜 부하에 대응하므로 부분부하 시 에너지 절약 효과가 큽니다." },
  { cat:"공기조화", q:"가습 방법 중 단열 가습(증발 가습)의 특징은?", options:["온도 상승","엔탈피 증가","건구온도 하강, 엔탈피 일정","건구온도 상승, 절대습도 일정"], answer:2, explanation:"단열 가습은 물이 증발하면서 열을 빼앗아 건구온도는 내려가지만 엔탈피는 거의 일정합니다." },
  { cat:"공기조화", q:"전열교환기(ERV)의 주요 역할은?", options:["냉매 압축","배기와 급기 사이의 열·수분 교환","공기 냉각만","습도 제거만"], answer:1, explanation:"전열교환기는 배기(Exhaust)와 급기(Supply) 사이에서 열과 수분을 동시에 교환하여 에너지를 회수합니다." },
  { cat:"공기조화", q:"냉각탑(Cooling Tower)의 역할로 옳은 것은?", options:["냉수 생산","응축기의 열을 물로 냉각 후 대기로 방열","냉매 압축","공기 냉각·제습"], answer:1, explanation:"냉각탑은 응축기에서 냉각수가 흡수한 열을 증발 냉각 원리로 대기에 방출합니다." },
  { cat:"공기조화", q:"빙축열(Ice Storage) 시스템의 장점으로 옳은 것은?", options:["초기 투자비 낮음","심야 전력 활용으로 운전비 절감","낮은 냉동능력 요구","소음이 적다"], answer:1, explanation:"빙축열은 심야 전력으로 얼음을 만들어 주간 냉방에 활용함으로써 전력비를 절감합니다." },
  { cat:"공기조화", q:"공기조화기(AHU)의 구성 요소가 아닌 것은?", options:["냉각코일","가열코일","팽창밸브","가습기"], answer:2, explanation:"AHU 구성: 필터, 냉각코일, 가열코일, 가습기, 송풍기 등. 팽창밸브는 냉동장치 구성요소입니다." },
  { cat:"공기조화", q:"냉수 코일에서 공기와 냉수의 흐름 방향으로 효율이 가장 높은 방식은?", options:["병류(Parallel Flow)","직교류(Cross Flow)","향류(Counter Flow)","혼류"], answer:2, explanation:"향류(Counter Flow)는 온도차가 균등하게 유지되어 열전달 효율이 가장 높습니다." },
  { cat:"공기조화", q:"실내 CO₂ 농도 기준(환기 기준)으로 일반적으로 사용되는 값은?", options:["500ppm","1,000ppm","2,000ppm","3,000ppm"], answer:1, explanation:"실내공기질 기준에서 CO₂ 허용 농도는 일반적으로 1,000ppm 이하입니다." },
  { cat:"공기조화", q:"이코노마이저(Economizer) 사이클의 목적은?", options:["냉동기 보호","외기 조건이 좋을 때 외기만으로 냉방하여 에너지 절약","가습 효율 향상","소음 저감"], answer:1, explanation:"이코노마이저는 외기 엔탈피가 낮을 때 외기 냉방(Free Cooling)으로 기계 냉방 없이 냉방합니다." },
  { cat:"공기조화", q:"공기조화 전공기 방식의 단점으로 옳은 것은?", options:["개별 제어 어려움","환기 불가","초기 비용이 낮다","에너지 효율이 낮다"], answer:0, explanation:"전공기 방식은 중앙에서 일괄 처리하므로 각 실 개별 제어가 어렵고 덕트 공간이 많이 필요합니다." },
  { cat:"공기조화", q:"클린룸(Clean Room)의 청정도 등급 기준은?", options:["온도","CO₂ 농도","단위 체적당 입자 수","풍속"], answer:2, explanation:"클린룸 등급(ISO 14644)은 단위 체적(m³)당 일정 크기 이상 입자 수로 결정됩니다." },
  { cat:"공기조화", q:"공기조화 방식에서 멀티존 유닛(Multi-Zone Unit)의 특징은?", options:["단일 온도만 공급","여러 구역에 각각 다른 온도의 공기를 공급","냉매를 각 실로 직접 공급","외기를 사용하지 않는다"], answer:1, explanation:"멀티존 유닛은 하나의 AHU에서 여러 구역별로 혼합 댐퍼를 사용해 각각 다른 온도의 공기를 공급합니다." },
  { cat:"공기조화", q:"공기 냉각 코일의 바이패스 팩터(BF)가 클수록 나타나는 현상은?", options:["코일 효율 증가","냉각·감습 효과 감소","공급 공기 온도 저하","에너지 소비 감소"], answer:1, explanation:"바이패스 팩터(BF)가 클수록 코일과 접촉하지 않고 통과하는 공기 비율이 많아 냉각·감습 효과가 감소합니다." },
  { cat:"공기조화", q:"ASHRAE 55 기준의 열 쾌적성(Thermal Comfort) 주요 영향 인자가 아닌 것은?", options:["공기 온도","평균 복사 온도","CO₂ 농도","착의량(Clo)"], answer:2, explanation:"열 쾌적성 6가지 인자: 공기 온도, 평균 복사 온도, 기류 속도, 상대습도, 대사량(Met), 착의량(Clo). CO₂ 농도는 공기질 인자입니다." },

  // ── 냉동장치 및 부속기기 (20문제) ────────────────────────────
  { cat:"냉동장치 및 부속기기", q:"팽창밸브의 주된 역할은?", options:["냉매 압축","냉매 증발","고압 액냉매를 저압으로 교축","냉매 열 방출"], answer:2, explanation:"팽창밸브는 고온·고압 액냉매를 교축하여 저온·저압으로 만들어 증발기로 보냅니다." },
  { cat:"냉동장치 및 부속기기", q:"온도식 자동팽창밸브(TEV)의 감온통 위치로 옳은 것은?", options:["응축기 입구","팽창밸브 입구","증발기 출구 흡입관","압축기 토출관"], answer:2, explanation:"TEV의 감온통은 증발기 출구 흡입관에 부착하여 과열도를 감지하고 밸브 개도를 조절합니다." },
  { cat:"냉동장치 및 부속기기", q:"건식 증발기와 만액식 증발기의 차이로 옳은 것은?", options:["건식은 증발기 전체가 액냉매로 채워진다","만액식은 냉매가 출구에서 과열된다","건식은 증발기 출구에서 약간 과열된다","만액식이 건식보다 냉각 효율이 낮다"], answer:2, explanation:"건식은 출구 냉매가 과열(5~8°C)되고, 만액식은 전체가 액냉매로 채워져 열전달 효율이 높습니다." },
  { cat:"냉동장치 및 부속기기", q:"유분리기(Oil Separator)의 설치 위치로 옳은 것은?", options:["증발기와 압축기 사이","압축기 토출관과 응축기 사이","응축기와 팽창밸브 사이","팽창밸브와 증발기 사이"], answer:1, explanation:"유분리기는 압축기 토출관에 설치하여 토출가스 중 냉동유를 분리하고 응축기로는 냉매만 보냅니다." },
  { cat:"냉동장치 및 부속기기", q:"액분리기(Accumulator)의 주요 역할은?", options:["냉동유 분리","액냉매가 압축기로 유입되는 것을 방지","냉매 중 불응축가스 제거","냉매 건조(제습)"], answer:1, explanation:"액분리기는 압축기 흡입측에 설치하여 미증발 액냉매가 압축기로 유입되는 것을 방지합니다." },
  { cat:"냉동장치 및 부속기기", q:"수액기(Receiver)의 역할로 옳은 것은?", options:["냉매 압축","응축된 액냉매 저장 및 안정 공급","냉매 과냉각","불응축가스 제거"], answer:1, explanation:"수액기는 응축기 하류에 설치하여 액냉매를 저장하고 부하 변동에 관계없이 안정적으로 공급합니다." },
  { cat:"냉동장치 및 부속기기", q:"드라이어(건조기)를 설치하는 주된 이유는?", options:["냉동유 회수","냉매 중 수분 제거","불응축가스 제거","냉매 과냉각"], answer:1, explanation:"드라이어는 냉매 배관 중 수분을 흡착하여 팽창밸브 동결 및 부식을 방지합니다." },
  { cat:"냉동장치 및 부속기기", q:"왕복동 압축기(Reciprocating Compressor)의 특징으로 틀린 것은?", options:["소용량~중용량에 적합","압축비를 크게 할 수 있다","진동과 소음이 크다","연속적인 토출로 맥동이 없다"], answer:3, explanation:"왕복동 압축기는 피스톤 왕복운동으로 맥동(pulsation)이 발생합니다." },
  { cat:"냉동장치 및 부속기기", q:"스크류 압축기(Screw Compressor)의 특징으로 옳은 것은?", options:["소용량에 주로 사용","맥동이 심하다","진동이 적고 연속 토출","흡입밸브와 토출밸브가 필요하다"], answer:2, explanation:"스크류 압축기는 암·수 로터의 맞물림으로 연속 압축하므로 진동이 적고 맥동이 거의 없습니다." },
  { cat:"냉동장치 및 부속기기", q:"원심 압축기(Centrifugal Compressor)의 특징으로 옳은 것은?", options:["소용량에 적합","서징(Surging) 현상이 발생할 수 있다","압축비가 매우 높다","맥동이 크다"], answer:1, explanation:"원심 압축기는 대용량에 적합하며 저유량 고압에서 서징(역류 불안정) 현상이 발생할 수 있습니다." },
  { cat:"냉동장치 및 부속기기", q:"고압차단스위치(High Pressure Switch) 작동 목적은?", options:["저압 측 압력 유지","응축압력 이상 상승 시 압축기 보호","팽창밸브 개도 조절","냉동유 압력 유지"], answer:1, explanation:"고압차단스위치는 응축압력이 설정값 이상으로 상승할 때 압축기를 정지시켜 장치를 보호합니다." },
  { cat:"냉동장치 및 부속기기", q:"전자팽창밸브(EEV)의 장점으로 옳은 것은?", options:["구조가 단순하다","전기가 없어도 작동한다","과열도 제어 정밀도가 높다","가격이 저렴하다"], answer:2, explanation:"EEV(전자팽창밸브)는 스텝모터로 개도를 정밀하게 제어하여 과열도와 냉동효율을 최적화합니다." },
  { cat:"냉동장치 및 부속기기", q:"응축기 과부하(응축압력 이상 상승)의 원인으로 틀린 것은?", options:["냉각수 온도 상승","불응축가스 혼입","냉매 과충전","냉매 부족"], answer:3, explanation:"응축압력 상승 원인: 냉각수 온도 상승, 불응축가스, 냉매 과충전, 응축기 오염 등. 냉매 부족은 저압 저하 원인입니다." },
  { cat:"냉동장치 및 부속기기", q:"핀-튜브 증발기의 서리(결빙) 제거 방법으로 옳지 않은 것은?", options:["전기 히터 제상","핫가스 제상","물 분무 제상","냉매 과충전"], answer:3, explanation:"제상 방법: 전기 히터, 핫가스(Hot Gas), 물 분무, 오프사이클 제상 등. 냉매 과충전은 제상과 무관합니다." },
  { cat:"냉동장치 및 부속기기", q:"냉매 배관에서 트랩(Trap)을 설치하는 주요 목적은?", options:["냉매 유량 증가","냉동유가 압축기로 돌아오도록 유도","냉매 누설 방지","배관 진동 흡수"], answer:1, explanation:"흡입 배관의 트랩은 냉동유를 포집하여 압축기로 환유시키는 역할을 합니다." },
  { cat:"냉동장치 및 부속기기", q:"냉동기의 증발기 착상(Frosting) 원인이 아닌 것은?", options:["증발온도가 0°C 이하","공기 중 수분","냉각 부하 증가","압축기 과열"], answer:3, explanation:"착상은 증발온도가 0°C 이하이고 공기 중 수분이 증발기 표면에서 얼어붙는 현상입니다. 압축기 과열은 착상 원인이 아닙니다." },
  { cat:"냉동장치 및 부속기기", q:"흡수식 냉동기에서 흡수제와 냉매의 조합으로 옳은 것은?", options:["물(냉매) + 프레온(흡수제)","암모니아(냉매) + 물(흡수제)","물(냉매) + 암모니아(흡수제)","프레온(냉매) + 물(흡수제)"], answer:1, explanation:"흡수식 냉동기 주요 조합: ①물(냉매)+LiBr(흡수제), ②암모니아(냉매)+물(흡수제)." },
  { cat:"냉동장치 및 부속기기", q:"터보냉동기(원심식)의 용량 제어 방법으로 주로 사용되는 것은?", options:["흡입밸브 조절","인버터(회전수 제어)","흡입 베인(IGV) 조절","배출 댐퍼 조절"], answer:2, explanation:"터보냉동기의 주요 용량 제어: 흡입 가이드 베인(IGV) 조절, 인버터 속도 제어." },
  { cat:"냉동장치 및 부속기기", q:"냉동기 운전 중 흡입압력이 비정상적으로 낮을 때의 원인으로 거리가 먼 것은?", options:["냉매 부족","팽창밸브 막힘","증발기 오염","냉각수 온도 저하"], answer:3, explanation:"흡입압력 저하 원인: 냉매 부족, 팽창밸브 막힘, 증발기 오염 등. 냉각수 온도 저하는 응축압력 저하 원인입니다." },
  { cat:"냉동장치 및 부속기기", q:"스크롤 압축기(Scroll Compressor)의 특징으로 옳은 것은?", options:["왕복동식이다","소음·진동이 크다","고정 스크롤과 선회 스크롤로 압축","압축비 조절이 쉽다"], answer:2, explanation:"스크롤 압축기는 고정 스크롤과 선회 스크롤의 맞물림으로 냉매를 압축하며 소음·진동이 적습니다." },

  // ── 배관 및 안전 (10문제) ─────────────────────────────────
  { cat:"배관 및 안전", q:"냉동장치의 안전밸브 설치 목적은?", options:["냉매 유량 조절","이상 고압 시 냉매 방출로 장치 보호","냉매 건조","유분 분리"], answer:1, explanation:"안전밸브는 설정압력 이상 시 냉매를 방출하여 폭발 등 위험을 방지합니다." },
  { cat:"배관 및 안전", q:"암모니아 냉동장치의 배관 재료로 적합한 것은?", options:["동관","황동관","강관(탄소강)","알루미늄관"], answer:2, explanation:"암모니아는 구리 및 구리합금과 반응하므로 강관(탄소강)을 사용해야 합니다." },
  { cat:"배관 및 안전", q:"냉동기계 운전 중 냉매 누설 발생 시 우선 조치사항으로 옳은 것은?", options:["즉시 운전 중단 및 환기","운전 계속하며 누설 부위 확인","냉매 추가 충전","전원 차단 후 방치"], answer:0, explanation:"냉매 누설 시 즉시 운전 중단, 환기 실시, 점화원 제거 후 누설 부위를 확인합니다." },
  { cat:"배관 및 안전", q:"냉동 배관의 보냉(단열) 목적으로 옳은 것은?", options:["배관 강도 향상","결로 방지 및 냉동효율 유지","배관 내식성 향상","냉매 압력 유지"], answer:1, explanation:"보냉은 외부로부터 열 침입을 막아 결로(이슬)를 방지하고 냉동효율을 유지합니다." },
  { cat:"배관 및 안전", q:"냉동장치 고압부의 내압시험 압력 기준으로 옳은 것은?", options:["설계압력의 1.1배","설계압력의 1.5배","설계압력의 2.0배","설계압력과 동일"], answer:1, explanation:"내압시험은 설계(최고허용)압력의 1.5배 이상의 압력으로 실시합니다." },
  { cat:"배관 및 안전", q:"냉동장치 기밀시험에 사용하는 가스로 적합한 것은?", options:["산소","수소","질소","수증기"], answer:2, explanation:"기밀시험(Leakage Test)에는 불활성 가스인 질소(N₂)를 사용합니다. 산소나 수소는 폭발 위험이 있습니다." },
  { cat:"배관 및 안전", q:"압력용기에서 수액기가 해당하는 종류는?", options:["저압 용기","고압 용기","중압 용기","특수 용기"], answer:1, explanation:"냉동 사이클에서 응축기, 수액기, 유분리기는 고압 용기이고 증발기, 액분리기는 저압 용기입니다." },
  { cat:"배관 및 안전", q:"냉동기계기사 선임 근거 법령은?", options:["건축법","고압가스 안전관리법","전기사업법","산업안전보건법"], answer:1, explanation:"고압가스 안전관리법에 따라 일정 냉동능력 이상의 냉동기에는 냉동기계기사 등을 안전관리자로 선임해야 합니다." },
  { cat:"배관 및 안전", q:"가스켓(Gasket) 사용 목적으로 옳은 것은?", options:["배관 지지","연결부 누설 방지용 밀봉재","배관 내식성 향상","냉매 유량 조절"], answer:1, explanation:"가스켓은 플랜지 등 연결부에 삽입하여 유체 누설을 방지하는 밀봉(sealing) 재료입니다." },
  { cat:"배관 및 안전", q:"냉동 배관 설치 시 신축이음(Expansion Joint)을 사용하는 이유는?", options:["유량 조절","온도 변화에 따른 배관 신축 흡수","압력 완충","냉동유 회수"], answer:1, explanation:"신축이음은 냉매 온도 변화로 인한 배관의 열팽창·수축을 흡수하여 배관 파손을 방지합니다." },

  // ── 전기 및 제어 (10문제) ─────────────────────────────────
  { cat:"전기 및 제어", q:"냉동장치에서 인버터(VVVF) 제어의 주요 목적은?", options:["전압 안정화","압축기 모터 속도 제어로 용량 조절 및 에너지 절약","전류 과부하 보호","역률 개선"], answer:1, explanation:"인버터는 주파수를 변환하여 압축기 회전수를 제어함으로써 부분부하 시 에너지를 절약합니다." },
  { cat:"전기 및 제어", q:"냉동장치에서 사용하는 온도 조절기(Thermostat)의 역할은?", options:["압력 제어","설정 온도에 따라 압축기를 On/Off 제어","습도 제어","전류 제어"], answer:1, explanation:"서모스탯은 냉각 공간의 온도를 감지하여 설정값에 따라 압축기를 제어합니다." },
  { cat:"전기 및 제어", q:"냉동장치 전기 회로에서 기동 전류를 줄이기 위한 방법으로 옳은 것은?", options:["직입 기동","Y-△ 기동","단상 기동","전전압 기동"], answer:1, explanation:"Y-△(스타-델타) 기동은 기동 시 전압을 1/√3으로 낮추어 기동 전류를 1/3으로 줄입니다." },
  { cat:"전기 및 제어", q:"냉동기의 자동화 제어에서 PID 제어의 특징으로 옳은 것은?", options:["비례 동작만 사용","잔류편차가 발생한다","비례+적분+미분 동작으로 정밀 제어","응답이 느리다"], answer:2, explanation:"PID 제어는 비례(P), 적분(I), 미분(D) 동작을 결합하여 빠른 응답과 정밀한 제어를 실현합니다." },
  { cat:"전기 및 제어", q:"냉동장치의 과부하 계전기(Over Load Relay) 역할은?", options:["전압 이상 감지","전류 과부하 시 모터 보호","주파수 이상 감지","단락 사고 차단"], answer:1, explanation:"과부하 계전기는 모터에 과전류가 흐를 때 회로를 차단하여 모터를 보호합니다." },
  { cat:"전기 및 제어", q:"냉동장치에서 4방 밸브(4-Way Valve)의 주요 용도는?", options:["냉매 유량 조절","히트펌프에서 냉난방 전환","압력 릴리프","냉매 건조"], answer:1, explanation:"4방 밸브는 히트펌프에서 냉매 흐름 방향을 전환하여 냉방/난방 모드를 변경합니다." },
  { cat:"전기 및 제어", q:"냉동장치의 제상 제어(Defrost Control) 방식으로 옳지 않은 것은?", options:["시간 제어","온도 차이 제어","압력 차이 제어","냉매 충전량 제어"], answer:3, explanation:"제상 제어 방식: 시간 제어, 온도차 제어, 압력차 제어 등. 냉매 충전량 제어는 제상 방식이 아닙니다." },
  { cat:"전기 및 제어", q:"냉동장치에 사용되는 전자밸브(Solenoid Valve)의 특징으로 옳은 것은?", options:["수동 조작만 가능","전기 신호로 자동 개폐","유량의 연속적 조절 가능","고압에서만 사용 가능"], answer:1, explanation:"전자밸브는 전자석 코일의 전기 신호(ON/OFF)로 밸브를 자동으로 열고 닫습니다." },
  { cat:"전기 및 제어", q:"냉동기의 BMS(Building Management System) 연동 목적으로 옳은 것은?", options:["냉매 자동 충전","에너지 모니터링 및 통합 제어","구조물 강도 측정","냉각수 자동 보충"], answer:1, explanation:"BMS는 냉동·공조 설비를 통합 모니터링하고 에너지 사용을 최적화하는 건물 자동화 시스템입니다." },
  { cat:"전기 및 제어", q:"냉동장치 운전 중 압축기가 갑자기 정지하는 원인으로 가장 거리가 먼 것은?", options:["고압차단스위치 작동","과부하 계전기 작동","저압차단스위치 작동","응축기 팬 속도 증가"], answer:3, explanation:"압축기 정지 원인: 고압/저압 차단, 과부하, 유압 차단 등. 응축기 팬 속도 증가는 오히려 정상 운전에 도움을 줍니다." }
];

const QUIZ_COUNT = 10;
let questions = [];
let current = 0;
let score = 0;
let userAnswers = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initQuiz() {
  const cats = [...new Set(allQuestions.map(q => q.cat))];
  const selected = [];
  const shuffledAll = shuffle(allQuestions);
  cats.forEach(cat => {
    const catQs = shuffledAll.filter(q => q.cat === cat);
    selected.push(catQs[0]);
  });
  const remaining = shuffle(shuffledAll.filter(q => !selected.includes(q)));
  let i = 0;
  while (selected.length < QUIZ_COUNT && i < remaining.length) {
    selected.push(remaining[i++]);
  }
  questions = shuffle(selected).slice(0, QUIZ_COUNT);
  current = 0;
  score = 0;
  userAnswers = new Array(QUIZ_COUNT).fill(null);
}

function loadQuestion() {
  const q = questions[current];
  const total = questions.length;
  const answered = userAnswers[current] !== null;

  document.getElementById('categoryBadge').textContent = '📂 ' + q.cat;
  document.getElementById('progressFill').style.width = ((current / total) * 100) + '%';
  document.getElementById('progressText').textContent = `${current + 1} / ${total}`;
  document.getElementById('questionNum').textContent = `문제 ${current + 1}`;
  document.getElementById('questionText').textContent = q.q;

  const expEl = document.getElementById('explanation');
  if (answered) {
    expEl.textContent = '💡 ' + q.explanation;
    expEl.style.display = 'block';
  } else {
    expEl.style.display = 'none';
  }

  const isLast = current === questions.length - 1;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = !answered;
  nextBtn.textContent = isLast ? '결과 보기' : '다음 문제';
  document.getElementById('prevBtn').disabled = current === 0;

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${['①','②','③','④'][i]} ${opt}`;
    if (answered) {
      btn.disabled = true;
      if (i === q.answer) btn.classList.add('correct');
      if (i === userAnswers[current] && userAnswers[current] !== q.answer) btn.classList.add('wrong');
    } else {
      btn.onclick = () => selectAnswer(i);
    }
    optionsEl.appendChild(btn);
  });
}

function selectAnswer(index) {
  if (userAnswers[current] !== null) return;
  const q = questions[current];
  userAnswers[current] = index;
  if (index === q.answer) score++;
  loadQuestion();
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showResult();
  else loadQuestion();
}

function prevQuestion() {
  if (current > 0) { current--; loadQuestion(); }
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('scoreText').textContent = `${score} / ${total}`;

  let msg = '';
  if (pct === 100) msg = '완벽합니다! 합격 확실! 🏆';
  else if (pct >= 80) msg = '훌륭해요! 합격권입니다! 👍';
  else if (pct >= 60) msg = '조금만 더 공부하면 합격! 📚';
  else msg = '기초부터 다시 공부해봐요! 💪';
  document.getElementById('scoreMsg').textContent = msg;

  const reviewEl = document.getElementById('reviewList');
  reviewEl.innerHTML = '';
  questions.forEach((q, i) => {
    const ok = userAnswers[i] === q.answer;
    const div = document.createElement('div');
    div.className = 'review-item ' + (ok ? 'ok' : 'ng');
    div.innerHTML = `<span class="review-icon">${ok ? '✅' : '❌'}</span><span><b>문제${i+1} [${q.cat}]</b><br>${q.q}</span>`;
    reviewEl.appendChild(div);
  });
}

function restart() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  initQuiz();
  loadQuestion();
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}

initQuiz();
loadQuestion();
</script>

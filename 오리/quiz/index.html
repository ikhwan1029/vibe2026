<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공조냉동기계기사 퀴즈</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      --card: #ffffff;
      --text: #1e3a5f;
      --subtext: #666;
      --progress-bg: #e0e0e0;
      --qbox-bg: #f0f7ff;
      --qbox-border: #2563eb;
      --option-bg: #ffffff;
      --option-border: #ddd;
      --option-hover-bg: #eff6ff;
      --option-hover-border: #2563eb;
      --explain-bg: #fffbeb;
      --explain-border: #fcd34d;
      --explain-text: #92400e;
      --result-h2: #1e3a5f;
      --score-color: #2563eb;
      --score-msg: #555;
    }

    [data-theme="dark"] {
      --bg: linear-gradient(135deg, #0a0a0a, #111827, #1e293b);
      --card: #1e293b;
      --text: #e2e8f0;
      --subtext: #94a3b8;
      --progress-bg: #334155;
      --qbox-bg: #0f172a;
      --qbox-border: #3b82f6;
      --option-bg: #0f172a;
      --option-border: #334155;
      --option-hover-bg: #1e3a5f;
      --option-hover-border: #3b82f6;
      --explain-bg: #1c1a07;
      --explain-border: #854d0e;
      --explain-text: #fcd34d;
      --result-h2: #e2e8f0;
      --score-color: #60a5fa;
      --score-msg: #94a3b8;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s;
    }

    .container {
      background: var(--card);
      border-radius: 20px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transition: background 0.3s;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    h1 {
      color: var(--text);
      font-size: 24px;
      flex: 1;
      text-align: center;
    }

    .dark-toggle {
      background: none;
      border: 2px solid var(--option-border);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
      color: var(--text);
    }

    .dark-toggle:hover { border-color: var(--qbox-border); }

    .subtitle {
      text-align: center;
      color: var(--subtext);
      font-size: 14px;
      margin-bottom: 30px;
    }

    .progress-bar {
      background: var(--progress-bg);
      border-radius: 999px;
      height: 10px;
      margin-bottom: 10px;
    }

    .progress-fill {
      background: linear-gradient(90deg, #2563eb, #06b6d4);
      height: 10px;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .progress-text {
      text-align: right;
      font-size: 13px;
      color: var(--subtext);
      margin-bottom: 24px;
    }

    .question-box {
      background: var(--qbox-bg);
      border-left: 5px solid var(--qbox-border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .question-num {
      font-size: 12px;
      color: var(--qbox-border);
      font-weight: bold;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 17px;
      color: var(--text);
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option {
      padding: 14px 18px;
      border: 2px solid var(--option-border);
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
      background: var(--option-bg);
      color: var(--text);
      text-align: left;
    }

    .option:hover:not(:disabled) {
      border-color: var(--option-hover-border);
      background: var(--option-hover-bg);
    }

    .option.correct {
      border-color: #16a34a;
      background: #f0fdf4;
      color: #15803d;
      font-weight: bold;
    }

    [data-theme="dark"] .option.correct {
      background: #052e16;
      color: #4ade80;
    }

    .option.wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #dc2626;
    }

    [data-theme="dark"] .option.wrong {
      background: #1c0a0a;
      color: #f87171;
    }

    .option:disabled { cursor: default; }

    .explanation {
      background: var(--explain-bg);
      border: 1px solid var(--explain-border);
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      color: var(--explain-text);
      line-height: 1.6;
      margin-bottom: 20px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #2563eb, #06b6d4);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .result {
      text-align: center;
      display: none;
    }

    .result h2 {
      font-size: 28px;
      color: var(--result-h2);
      margin-bottom: 10px;
    }

    .score {
      font-size: 64px;
      font-weight: bold;
      color: var(--score-color);
      margin: 20px 0;
    }

    .score-msg {
      font-size: 18px;
      color: var(--score-msg);
      margin-bottom: 30px;
    }

    .restart-btn {
      padding: 14px 40px;
      background: linear-gradient(90deg, #2563eb, #06b6d4);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .quiz-area { display: block; }
  </style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div style="width:70px"></div>
    <h1>❄️ 공조냉동기계기사 퀴즈</h1>
    <button class="dark-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
  <p class="subtitle">실기 / 필기 대비 핵심 문제 · 매회 랜덤 10문제</p>

  <div class="quiz-area" id="quizArea">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText"></div>

    <div class="question-box">
      <div class="question-num" id="questionNum"></div>
      <div class="question-text" id="questionText"></div>
    </div>

    <div class="options" id="options"></div>
    <div class="explanation" id="explanation"></div>
    <button class="btn" id="nextBtn" disabled onclick="nextQuestion()">다음 문제</button>
  </div>

  <div class="result" id="result">
    <h2>퀴즈 완료!</h2>
    <div class="score" id="scoreText"></div>
    <div class="score-msg" id="scoreMsg"></div>
    <button class="restart-btn" onclick="restart()">다시 풀기</button>
  </div>
</div>

<script>
  const allQuestions = [
    {
      q: "냉동사이클에서 압축기의 역할로 옳은 것은?",
      options: ["냉매를 응축시킨다", "냉매 증기를 고온·고압으로 압축한다", "냉매를 팽창시킨다", "냉매를 증발시킨다"],
      answer: 1,
      explanation: "압축기는 증발기에서 나온 저온·저압의 냉매 증기를 고온·고압으로 압축하여 응축기로 보내는 역할을 합니다."
    },
    {
      q: "표준 냉동사이클의 순서로 옳은 것은?",
      options: ["압축 → 증발 → 팽창 → 응축", "증발 → 압축 → 응축 → 팽창", "응축 → 팽창 → 증발 → 압축", "팽창 → 응축 → 압축 → 증발"],
      answer: 1,
      explanation: "표준 냉동사이클: 증발기(저압 흡열) → 압축기(고압 압축) → 응축기(고압 방열) → 팽창밸브(저압 팽창) 순서입니다."
    },
    {
      q: "냉동능력의 단위 RT(냉동톤)의 정의로 옳은 것은?",
      options: ["0°C의 물 1ton을 24시간 동안 0°C의 얼음으로 만드는 능력", "0°C의 물 1kg을 1시간 동안 냉각하는 능력", "100°C의 증기 1ton을 응축시키는 능력", "물 1ton을 1°C 냉각하는 데 필요한 열량"],
      answer: 0,
      explanation: "1RT(냉동톤)은 0°C의 물 1ton(1,000kg)을 24시간 동안 0°C의 얼음으로 만드는 냉동능력으로 약 3,320kcal/h입니다."
    },
    {
      q: "팽창밸브의 주된 역할은?",
      options: ["냉매를 압축하여 압력을 높인다", "냉매를 증발시켜 열을 흡수한다", "고압의 액냉매를 저압으로 교축(팽창)시킨다", "냉매의 열을 외부로 방출한다"],
      answer: 2,
      explanation: "팽창밸브는 응축기에서 나온 고온·고압의 액냉매를 교축작용으로 저온·저압 상태로 만들어 증발기로 보냅니다."
    },
    {
      q: "프레온 냉매 R-22의 화학식으로 옳은 것은?",
      options: ["CCl₂F₂", "CHClF₂", "CH₂F₂", "C₂H₂F₄"],
      answer: 1,
      explanation: "R-22(HCFC-22)의 화학식은 CHClF₂(클로로디플루오로메탄)입니다. R-12는 CCl₂F₂, R-32는 CH₂F₂입니다."
    },
    {
      q: "성적계수(COP)의 정의로 옳은 것은?",
      options: ["압축일 / 냉동효과", "냉동효과 / 압축일", "응축열량 / 냉동효과", "냉동효과 / 응축열량"],
      answer: 1,
      explanation: "냉동기의 성적계수(COP) = 냉동효과(Q₂) / 압축일(W)입니다. COP가 클수록 효율이 높습니다."
    },
    {
      q: "공기조화의 4대 요소에 해당하지 않는 것은?",
      options: ["온도", "습도", "기류", "소음"],
      answer: 3,
      explanation: "공기조화의 4대 요소는 온도, 습도, 기류(풍속), 청정도(먼지)입니다. 소음은 포함되지 않습니다."
    },
    {
      q: "냉매가 갖추어야 할 조건으로 틀린 것은?",
      options: ["증발잠열이 클 것", "임계온도가 낮을 것", "독성과 가연성이 없을 것", "증발압력이 대기압보다 높을 것"],
      answer: 1,
      explanation: "냉매는 임계온도가 높아야 상온에서 응축이 쉽습니다. 임계온도가 낮으면 상온에서 액화가 어려워 냉매로 사용하기 부적합합니다."
    },
    {
      q: "히트펌프(Heat Pump)의 성적계수(COP_HP)와 냉동기 COP의 관계로 옳은 것은?",
      options: ["COP_HP = COP_냉동 - 1", "COP_HP = COP_냉동 + 1", "COP_HP = COP_냉동 × 2", "COP_HP = 1 / COP_냉동"],
      answer: 1,
      explanation: "히트펌프 COP = 냉동기 COP + 1 입니다. 히트펌프는 냉동효과와 압축일을 모두 난방에 활용하므로 항상 COP_HP > COP_냉동입니다."
    },
    {
      q: "습공기 선도(Psychrometric Chart)에서 노점온도(露點溫度)란?",
      options: ["공기를 가열할 때의 온도", "습공기를 냉각할 때 수분이 응결되기 시작하는 온도", "건구온도와 습구온도의 평균", "상대습도 50%일 때의 온도"],
      answer: 1,
      explanation: "노점온도는 습공기를 일정 압력 하에서 냉각할 때 수증기가 응결(이슬)되기 시작하는 온도로, 상대습도가 100%가 되는 온도입니다."
    },
    {
      q: "암모니아(R-717) 냉매의 특성으로 틀린 것은?",
      options: ["독성이 있다", "가연성이 있다", "오존파괴지수(ODP)가 0이다", "동 및 동합금 배관을 사용한다"],
      answer: 3,
      explanation: "암모니아는 동(구리) 및 동합금과 반응하여 부식을 일으키므로 강관(철관)을 사용해야 합니다."
    },
    {
      q: "냉동장치에서 액백(Liquid Back)이 발생하는 원인으로 옳은 것은?",
      options: ["압축기 과열", "팽창밸브 과소 개방", "증발기 냉각 부족으로 액냉매가 압축기로 흡입", "응축압력 저하"],
      answer: 2,
      explanation: "액백(Liquid Back)은 증발기에서 완전히 증발하지 못한 액냉매가 압축기로 흡입되는 현상으로, 압축기 손상의 원인이 됩니다."
    },
    {
      q: "건식 팽창밸브(Dry Expansion Valve)와 만액식(Flooded Type) 증발기의 차이로 옳은 것은?",
      options: [
        "건식은 증발기 전체가 액냉매로 채워진다",
        "만액식은 냉매가 증발기 출구에서 과열된 상태이다",
        "건식은 냉매가 증발기 출구에서 약간 과열된 상태이다",
        "만액식은 냉각 효율이 건식보다 낮다"
      ],
      answer: 2,
      explanation: "건식 팽창밸브 방식은 증발기 출구에서 냉매가 약간 과열(5~8°C)된 상태이며, 만액식은 증발기 전체가 액냉매로 채워져 열전달 효율이 높습니다."
    },
    {
      q: "냉동장치에서 불응축가스(Non-condensable Gas)가 혼입되었을 때 나타나는 현상으로 옳은 것은?",
      options: ["흡입압력이 상승한다", "응축압력이 비정상적으로 상승한다", "냉동능력이 증가한다", "압축기 흡입온도가 낮아진다"],
      answer: 1,
      explanation: "불응축가스(공기, 질소 등)가 혼입되면 응축기 내 분압이 증가하여 응축압력이 비정상적으로 상승하고 냉동능력이 저하됩니다."
    },
    {
      q: "상대습도(Relative Humidity)의 정의로 옳은 것은?",
      options: [
        "단위 체적당 수증기의 질량",
        "현재 수증기압과 동일 온도의 포화수증기압의 비",
        "건구온도와 습구온도의 차이",
        "공기 중 수증기의 몰분율"
      ],
      answer: 1,
      explanation: "상대습도 = (현재 수증기압 / 포화수증기압) × 100(%)로, 공기가 수증기로 포화된 정도를 나타냅니다."
    },
    {
      q: "냉동기의 응축온도가 높아질 때 나타나는 현상으로 옳은 것은?",
      options: ["성적계수(COP)가 증가한다", "압축비가 감소한다", "소비동력이 증가한다", "냉동능력이 증가한다"],
      answer: 2,
      explanation: "응축온도가 높아지면 압축비 증가 → 소비동력 증가, 냉동효과 감소 → COP 감소의 결과가 나타납니다."
    },
    {
      q: "2단 압축 냉동사이클을 적용하는 주요 이유는?",
      options: [
        "냉매 충전량을 줄이기 위해",
        "압축비가 높을 때 압축 효율 향상과 토출온도 저하를 위해",
        "응축온도를 높이기 위해",
        "팽창밸브 수명 연장을 위해"
      ],
      answer: 1,
      explanation: "증발온도가 매우 낮아 압축비가 클 때(보통 8 이상) 2단 압축을 적용하여 압축 효율을 높이고 토출가스 온도를 낮춥니다."
    },
    {
      q: "냉동장치에서 수분(수분 혼입)이 미치는 영향으로 틀린 것은?",
      options: [
        "팽창밸브 아이싱(icing) 발생",
        "냉동유 열화 및 슬러지 생성",
        "응축압력 감소",
        "금속부식 및 냉매 분해 촉진"
      ],
      answer: 2,
      explanation: "수분 혼입 시 팽창밸브 동결, 냉동유 열화, 금속부식 등이 발생합니다. 응축압력은 불응축가스 혼입 시 상승하며, 수분은 직접적인 응축압력 감소와는 관계없습니다."
    },
    {
      q: "공기조화 방식 중 팬코일 유닛(FCU) 방식의 특징으로 옳은 것은?",
      options: [
        "중앙에서 공기를 처리하여 각 실에 공급한다",
        "각 실에 설치된 유닛에서 냉온수로 공기를 처리한다",
        "냉매를 직접 각 실까지 배관한다",
        "환기가 전혀 이루어지지 않는다"
      ],
      answer: 1,
      explanation: "팬코일 유닛(FCU) 방식은 각 실에 소형 유닛을 설치하고 중앙에서 냉온수를 공급하여 각 실에서 공기를 처리하는 방식입니다."
    },
    {
      q: "몰리에르 선도(Mollier Diagram)에서 가로축과 세로축이 나타내는 것은?",
      options: [
        "가로축: 온도, 세로축: 압력",
        "가로축: 엔탈피, 세로축: 압력",
        "가로축: 엔트로피, 세로축: 온도",
        "가로축: 압력, 세로축: 엔탈피"
      ],
      answer: 1,
      explanation: "냉동용 몰리에르 선도(P-h 선도)는 가로축이 엔탈피(h), 세로축이 압력(P)입니다. 냉동사이클 분석에 주로 사용됩니다."
    }
  ];

  const QUIZ_COUNT = 10;
  let questions = [];
  let current = 0;
  let score = 0;
  let answered = false;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function initQuiz() {
    questions = shuffle(allQuestions).slice(0, QUIZ_COUNT);
    current = 0;
    score = 0;
    answered = false;
  }

  function loadQuestion() {
    const q = questions[current];
    const total = questions.length;

    document.getElementById('progressFill').style.width = ((current / total) * 100) + '%';
    document.getElementById('progressText').textContent = `${current + 1} / ${total}`;
    document.getElementById('questionNum').textContent = `문제 ${current + 1}`;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('explanation').style.display = 'none';
    document.getElementById('nextBtn').disabled = true;
    answered = false;

    const optionsEl = document.getElementById('options');
    optionsEl.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.textContent = `${['①','②','③','④'][i]} ${opt}`;
      btn.onclick = () => selectAnswer(i);
      optionsEl.appendChild(btn);
    });
  }

  function selectAnswer(index) {
    if (answered) return;
    answered = true;

    const q = questions[current];
    const btns = document.querySelectorAll('.option');
    btns.forEach(b => b.disabled = true);
    btns[q.answer].classList.add('correct');

    if (index === q.answer) {
      score++;
    } else {
      btns[index].classList.add('wrong');
    }

    const expEl = document.getElementById('explanation');
    expEl.textContent = '💡 ' + q.explanation;
    expEl.style.display = 'block';
    document.getElementById('nextBtn').disabled = false;

    const isLast = current === questions.length - 1;
    document.getElementById('nextBtn').textContent = isLast ? '결과 보기' : '다음 문제';
  }

  function nextQuestion() {
    current++;
    if (current >= questions.length) {
      showResult();
    } else {
      loadQuestion();
    }
  }

  function showResult() {
    document.getElementById('quizArea').style.display = 'none';
    const result = document.getElementById('result');
    result.style.display = 'block';

    const total = questions.length;
    const pct = Math.round((score / total) * 100);
    document.getElementById('scoreText').textContent = `${score} / ${total}`;

    let msg = '';
    if (pct === 100) msg = '완벽합니다! 합격 확실! 🏆';
    else if (pct >= 80) msg = '훌륭해요! 합격권입니다! 👍';
    else if (pct >= 60) msg = '조금만 더 공부하면 합격! 📚';
    else msg = '기초부터 다시 공부해봐요! 💪';

    document.getElementById('scoreMsg').textContent = msg;
  }

  function restart() {
    document.getElementById('result').style.display = 'none';
    document.getElementById('quizArea').style.display = 'block';
    initQuiz();
    loadQuestion();
  }

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  }

  initQuiz();
  loadQuestion();
</script>
</body>
</html>

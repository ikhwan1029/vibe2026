<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공조냉동기계기사 퀴즈</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      color: #1e3a5f;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .progress-bar {
      background: #e0e0e0;
      border-radius: 999px;
      height: 10px;
      margin-bottom: 10px;
    }

    .progress-fill {
      background: linear-gradient(90deg, #2563eb, #06b6d4);
      height: 10px;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .progress-text {
      text-align: right;
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    .question-box {
      background: #f0f7ff;
      border-left: 5px solid #2563eb;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .question-num {
      font-size: 12px;
      color: #2563eb;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 17px;
      color: #1e3a5f;
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option {
      padding: 14px 18px;
      border: 2px solid #ddd;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
      background: white;
      text-align: left;
    }

    .option:hover:not(:disabled) {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .option.correct {
      border-color: #16a34a;
      background: #f0fdf4;
      color: #15803d;
      font-weight: bold;
    }

    .option.wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #dc2626;
    }

    .option:disabled { cursor: default; }

    .explanation {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      color: #92400e;
      line-height: 1.6;
      margin-bottom: 20px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #2563eb, #06b6d4);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .result {
      text-align: center;
      display: none;
    }

    .result h2 {
      font-size: 28px;
      color: #1e3a5f;
      margin-bottom: 10px;
    }

    .score {
      font-size: 64px;
      font-weight: bold;
      color: #2563eb;
      margin: 20px 0;
    }

    .score-msg {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
    }

    .restart-btn {
      padding: 14px 40px;
      background: linear-gradient(90deg, #2563eb, #06b6d4);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .quiz-area { display: block; }
  </style>
</head>
<body>
<div class="container">
  <h1>❄️ 공조냉동기계기사 퀴즈</h1>
  <p class="subtitle">실기 / 필기 대비 핵심 문제</p>

  <div class="quiz-area" id="quizArea">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText"></div>

    <div class="question-box">
      <div class="question-num" id="questionNum"></div>
      <div class="question-text" id="questionText"></div>
    </div>

    <div class="options" id="options"></div>
    <div class="explanation" id="explanation"></div>
    <button class="btn" id="nextBtn" disabled onclick="nextQuestion()">다음 문제</button>
  </div>

  <div class="result" id="result">
    <h2>퀴즈 완료!</h2>
    <div class="score" id="scoreText"></div>
    <div class="score-msg" id="scoreMsg"></div>
    <button class="restart-btn" onclick="restart()">다시 풀기</button>
  </div>
</div>

<script>
  const questions = [
    {
      q: "냉동사이클에서 압축기의 역할로 옳은 것은?",
      options: ["냉매를 응축시킨다", "냉매 증기를 고온·고압으로 압축한다", "냉매를 팽창시킨다", "냉매를 증발시킨다"],
      answer: 1,
      explanation: "압축기는 증발기에서 나온 저온·저압의 냉매 증기를 고온·고압으로 압축하여 응축기로 보내는 역할을 합니다."
    },
    {
      q: "표준 냉동사이클의 순서로 옳은 것은?",
      options: [
        "압축 → 증발 → 팽창 → 응축",
        "증발 → 압축 → 응축 → 팽창",
        "응축 → 팽창 → 증발 → 압축",
        "팽창 → 응축 → 압축 → 증발"
      ],
      answer: 1,
      explanation: "표준 냉동사이클: 증발기(저압 흡열) → 압축기(고압 압축) → 응축기(고압 방열) → 팽창밸브(저압 팽창) 순서입니다."
    },
    {
      q: "냉동능력의 단위 RT(냉동톤)의 정의로 옳은 것은?",
      options: [
        "0°C의 물 1ton을 24시간 동안 0°C의 얼음으로 만드는 능력",
        "0°C의 물 1kg을 1시간 동안 냉각하는 능력",
        "100°C의 증기 1ton을 응축시키는 능력",
        "물 1ton을 1°C 냉각하는 데 필요한 열량"
      ],
      answer: 0,
      explanation: "1RT(냉동톤)은 0°C의 물 1ton(1,000kg)을 24시간 동안 0°C의 얼음으로 만드는 냉동능력으로 약 3,320kcal/h입니다."
    },
    {
      q: "팽창밸브의 주된 역할은?",
      options: [
        "냉매를 압축하여 압력을 높인다",
        "냉매를 증발시켜 열을 흡수한다",
        "고압의 액냉매를 저압으로 교축(팽창)시킨다",
        "냉매의 열을 외부로 방출한다"
      ],
      answer: 2,
      explanation: "팽창밸브는 응축기에서 나온 고온·고압의 액냉매를 교축작용으로 저온·저압 상태로 만들어 증발기로 보냅니다."
    },
    {
      q: "프레온 냉매 R-22의 화학식으로 옳은 것은?",
      options: ["CCl₂F₂", "CHClF₂", "CH₂F₂", "C₂H₂F₄"],
      answer: 1,
      explanation: "R-22(HCFC-22)의 화학식은 CHClF₂(클로로디플루오로메탄)입니다. R-12는 CCl₂F₂, R-32는 CH₂F₂입니다."
    },
    {
      q: "성적계수(COP)의 정의로 옳은 것은?",
      options: [
        "압축일 / 냉동효과",
        "냉동효과 / 압축일",
        "응축열량 / 냉동효과",
        "냉동효과 / 응축열량"
      ],
      answer: 1,
      explanation: "냉동기의 성적계수(COP) = 냉동효과(Q₂) / 압축일(W)입니다. COP가 클수록 효율이 높습니다."
    },
    {
      q: "공기조화의 4대 요소에 해당하지 않는 것은?",
      options: ["온도", "습도", "기류", "소음"],
      answer: 3,
      explanation: "공기조화의 4대 요소는 온도, 습도, 기류(풍속), 청정도(먼지)입니다. 소음은 포함되지 않습니다."
    },
    {
      q: "냉매가 갖추어야 할 조건으로 틀린 것은?",
      options: [
        "증발잠열이 클 것",
        "임계온도가 낮을 것",
        "독성과 가연성이 없을 것",
        "증발압력이 대기압보다 높을 것"
      ],
      answer: 1,
      explanation: "냉매는 임계온도가 높아야 상온에서 응축이 쉽습니다. 임계온도가 낮으면 상온에서 액화가 어려워 냉매로 사용하기 부적합합니다."
    },
    {
      q: "히트펌프(Heat Pump)의 성적계수(COP_HP)와 냉동기 COP의 관계로 옳은 것은?",
      options: [
        "COP_HP = COP_냉동 - 1",
        "COP_HP = COP_냉동 + 1",
        "COP_HP = COP_냉동 × 2",
        "COP_HP = 1 / COP_냉동"
      ],
      answer: 1,
      explanation: "히트펌프 COP = 냉동기 COP + 1 입니다. 히트펌프는 냉동효과와 압축일을 모두 난방에 활용하므로 항상 COP_HP > COP_냉동입니다."
    },
    {
      q: "습공기 선도(Psychrometric Chart)에서 노점온도(露點溫度)란?",
      options: [
        "공기를 가열할 때의 온도",
        "습공기를 냉각할 때 수분이 응결되기 시작하는 온도",
        "건구온도와 습구온도의 평균",
        "상대습도 50%일 때의 온도"
      ],
      answer: 1,
      explanation: "노점온도는 습공기를 일정 압력 하에서 냉각할 때 수증기가 응결(이슬)되기 시작하는 온도로, 상대습도가 100%가 되는 온도입니다."
    }
  ];

  let current = 0;
  let score = 0;
  let answered = false;

  function loadQuestion() {
    const q = questions[current];
    const total = questions.length;

    document.getElementById('progressFill').style.width = ((current / total) * 100) + '%';
    document.getElementById('progressText').textContent = `${current + 1} / ${total}`;
    document.getElementById('questionNum').textContent = `문제 ${current + 1}`;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('explanation').style.display = 'none';
    document.getElementById('nextBtn').disabled = true;
    answered = false;

    const optionsEl = document.getElementById('options');
    optionsEl.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.textContent = `${['①','②','③','④'][i]} ${opt}`;
      btn.onclick = () => selectAnswer(i);
      optionsEl.appendChild(btn);
    });
  }

  function selectAnswer(index) {
    if (answered) return;
    answered = true;

    const q = questions[current];
    const btns = document.querySelectorAll('.option');
    btns.forEach(b => b.disabled = true);
    btns[q.answer].classList.add('correct');

    if (index === q.answer) {
      score++;
    } else {
      btns[index].classList.add('wrong');
    }

    const expEl = document.getElementById('explanation');
    expEl.textContent = '💡 ' + q.explanation;
    expEl.style.display = 'block';
    document.getElementById('nextBtn').disabled = false;

    const isLast = current === questions.length - 1;
    document.getElementById('nextBtn').textContent = isLast ? '결과 보기' : '다음 문제';
  }

  function nextQuestion() {
    current++;
    if (current >= questions.length) {
      showResult();
    } else {
      loadQuestion();
    }
  }

  function showResult() {
    document.getElementById('quizArea').style.display = 'none';
    const result = document.getElementById('result');
    result.style.display = 'block';

    const total = questions.length;
    const pct = Math.round((score / total) * 100);
    document.getElementById('scoreText').textContent = `${score} / ${total}`;

    let msg = '';
    if (pct === 100) msg = '완벽합니다! 합격 확실! 🏆';
    else if (pct >= 80) msg = '훌륭해요! 합격권입니다! 👍';
    else if (pct >= 60) msg = '조금만 더 공부하면 합격! 📚';
    else msg = '기초부터 다시 공부해봐요! 💪';

    document.getElementById('scoreMsg').textContent = msg;
  }

  function restart() {
    current = 0;
    score = 0;
    document.getElementById('result').style.display = 'none';
    document.getElementById('quizArea').style.display = 'block';
    loadQuestion();
  }

  loadQuestion();
</script>
</body>
</html>
